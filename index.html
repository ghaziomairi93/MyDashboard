<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghazi Dashboard v1.5.1</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
<style>
:root{--bg:#0F0F13;--card:#1A1A22;--card2:#22222E;--border:#2E2E3E;--text:#F0EFE9;--muted:#8A8A9A;--blue:#4F8EF7;--led-green:#39FF14;--red-btn:#451a1a;--red-text:#ffb3b3}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:15px;padding-bottom:100px}

/* Layout Grid */
.dashboard-grid{display:flex;flex-direction:column;gap:12px}
.row-split{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Widget Base */
.widget-sq{height:160px;border-radius:24px;overflow:hidden;position:relative;display:flex;flex-direction:column;justify-content:center;padding:20px;border:1px solid var(--border)}

/* Weather Widget (Left) */
.w-bg-day{background:linear-gradient(135deg,#1A56CC,#4F8EF7)}
.w-bg-night{background:linear-gradient(135deg,#0a0a12,#16162b)}
.w-bg-sunrise{background:linear-gradient(135deg,#ff7e5f,#feb47b);color:#111}
.w-bg-sunset{background:linear-gradient(135deg,#ff4e50,#f9d423);color:#111}

/* Digital Clock Widget (Right - "City Digital" Style) */
.clock-widget{background:var(--card);text-align:center;gap:4px}
.clock-city-tag{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:700;margin-bottom:8px}
.clock-time{font-family:'Seven Segment',sans-serif;color:var(--led-green);font-size:32px;line-height:1;text-shadow:0 0 10px rgba(57,255,20,0.3)}
.clock-ms{font-family:'Seven Segment',sans-serif;color:var(--led-green);font-size:14px;opacity:0.7}

/* Search Overlay */
.search-overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;padding:15px;z-index:100}
.search-input{background:var(--card2);border:1px solid var(--blue);color:white;padding:10px;border-radius:10px;outline:none}
.search-item{padding:10px;background:var(--border);border-radius:8px;margin-top:5px;font-size:12px}

/* Stats Row */
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:15px;text-align:center}
.stat-val{font-size:24px;font-weight:700}
.stat-lab{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:4px}

/* Feed Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.card-head{padding:15px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:13px}
.list-item{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}

/* Footer Nuke */
.nuke-btn{background:var(--red-btn);color:var(--red-text);border:none;padding:16px;border-radius:16px;font-weight:700;width:100%;margin-top:20px}
</style>
</head>
<body>

<div class="dashboard-grid">
    
    <!-- ROW 1: Weather (Left) & Clock (Right) -->
    <div class="row-split">
        <!-- Weather Widget -->
        <div class="widget-sq w-bg-day" id="weather-box" onclick="toggleSearch()">
            <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;opacity:0.8">Weather</div>
            <div id="w-temp" style="font-size:36px;font-weight:700;margin:2px 0">--°</div>
            <div id="w-city" style="font-size:13px;font-weight:600">Loading...</div>
            
            <div class="search-overlay" id="search-box">
                <input type="text" class="search-input" id="city-in" placeholder="Search City..." oninput="searchCity(this.value)" onclick="event.stopPropagation()">
                <div id="search-results" style="margin-top:10px"></div>
                <div style="margin-top:auto;text-align:center;font-size:11px" onclick="event.stopPropagation();toggleSearch()">Cancel</div>
            </div>
        </div>

        <!-- City Digital Clock Widget -->
        <div class="widget-sq clock-widget">
            <div class="clock-city-tag" id="clock-city-label">UTC</div>
            <div class="clock-time" id="clock-main">00:00:00</div>
            <div class="clock-ms" id="clock-ms">.00</div>
        </div>
    </div>

    <!-- ROW 2: Tasks & Mail Count -->
    <div class="row-split">
        <div class="stat-card">
            <div class="stat-val" id="stat-tasks">0</div>
            <div class="stat-lab">Tasks To-Do</div>
        </div>
        <div class="stat-card">
            <div class="stat-val" id="stat-mail">0</div>
            <div class="stat-lab">Unread Mail</div>
        </div>
    </div>

    <!-- ROW 3: Google Calendar Count -->
    <div class="stat-card" style="padding:12px">
        <div class="stat-val" id="stat-events">0</div>
        <div class="stat-lab">Events Remaining Today</div>
    </div>

    <!-- ROW 4: Google Calendar Feed -->
    <div class="card">
        <div class="card-head">📅 Calendar</div>
        <div id="cal-list"></div>
    </div>

    <!-- ROW 5: Reminders -->
    <div class="card">
        <div class="card-head">🔔 Reminders <button onclick="addRem()" style="background:none;border:none;color:var(--blue);font-weight:700">+ Add</button></div>
        <div id="rem-list"></div>
    </div>

    <!-- ROW 6: Outlook Feed -->
    <div class="card">
        <div class="card-head">✉️ Outlook Inbox</div>
        <div id="mail-list"></div>
    </div>

    <button class="nuke-btn" onclick="fullNuke()">Clear Data and Sessions</button>

</div>
