<!-- 
  DASHBOARD VERSION: v1.3.19.03.26 (19:21:26)
  
  CHANGELOG:
  - Fixed Unread Count: Specifically targeting 'inbox' with isRead=false filter.
  - Weather: Manual location trigger added ("Press here to choose location").
  - Greeting: Time-aware (Morning/Afternoon/Evening) + Dynamic name from Outlook.
  - UI: Fixed Calendar input width bug.
  - UI: "X" buttons are now squared with soft edges and brighter background.
  - Branding: Added Google & Outlook logos to card headers.
  - Navigation: Replaced Refresh text with icon; added Logout per-service.
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghazi's Dashboard v1.3</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
:root{--bg:#0F0F13;--card:#1A1A22;--card2:#22222E;--border:#2E2E3E;--text:#F0EFE9;--muted:#8A8A9A;--blue:#4F8EF7;--blue2:#1A56CC;--red-bg:rgba(248,113,113,0.2);--red-text:#FF8585}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;}

header{padding:20px;background:rgba(15,15,19,0.95);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Playfair Display',serif;font-size:20px}.logo span{color:var(--blue)}
.version-tag{font-size:10px; color:var(--muted); background:var(--card2); padding:2px 6px; border-radius:4px; margin-left:8px;}

.greeting{padding:24px 20px 10px}
.greeting h1{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:4px; font-weight:700;}
.greeting p{font-size:14px;color:var(--muted); font-weight:500;}

.weather-card{margin:10px 20px; padding:20px; background: linear-gradient(135deg, #1A56CC, #4F8EF7); border-radius:24px; cursor:pointer;}
.weather-hint{font-size:12px; margin-top:10px; opacity:0.8; text-decoration:underline}

.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:10px 20px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:18px;}
.stat-val{font-size:28px;font-weight:700}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px; font-weight:600}

.section{padding:24px 20px 0}
.section-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-bottom:16px}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-name-group{display:flex; align-items:center; gap:10px; font-weight:600; font-size:15px}
.brand-icon{width:20px; height:20px; object-fit:contain}

.action-btns{display:flex; gap:8px; align-items:center}
.btn-icon{background:var(--card2); border:1px solid var(--border); color:var(--text); width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; cursor:pointer}
.btn-logout{background:var(--red-bg); border:none; color:var(--red-text); padding:0 12px; height:32px; border-radius:8px; font-size:11px; font-weight:700; cursor:pointer}

/* Squared Soft-Edge Delete Buttons */
.del-btn{width:32px; height:32px; border-radius:8px; background:var(--red-bg); color:var(--red-text); border:none; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:bold; cursor:pointer}

.cal-input-container{padding:16px; display:flex; flex-direction:column; gap:10px; background:rgba(255,255,255,0.02); border-bottom:1px solid var(--border)}
.cal-input{width:100%; background:var(--card2); border:1px solid var(--border); border-radius:10px; padding:12px; color:white; font-size:14px; outline:none}
.btn-add-cal{background:var(--blue2); color:white; border:none; padding:10px; border-radius:10px; font-weight:600}

.list-item{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.filter-bar{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border)}
.chip{font-size:12px;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap;font-weight:500}
.chip.active{background:var(--blue2);color:white;border-color:var(--blue2)}

.auth-prompt{padding:40px 20px; text-align:center;}
.btn-fancy-login{background:var(--blue2); color:white; border:none; padding:14px; border-radius:14px; font-weight:600; width: 100%; margin-top:15px}
</style>
</head>
<body>

<header>
  <div class="logo">G<span>.</span>Dashboard <span class="version-tag">v1.3.19.03.26</span></div>
</header>

<div class="greeting">
  <h1 id="greeting-text">Loading...</h1>
  <p id="greeting-sub"></p>
</div>

<div class="weather-card" onclick="getWeather()">
    <div id="weather-content">
        <div style="font-size:16px; font-weight:600">Weather</div>
        <div class="weather-hint">Press here to choose location</div>
    </div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-val" id="stat-events">0</div>
    <div class="stat-label">Events</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="stat-mail">0</div>
    <div class="stat-label">Inbox</div>
  </div>
</div>

<!-- Outlook -->
<div class="section" id="mail-sec">
  <div class="section-title">Outlook</div>
  <div class="card">
    <div class="card-head" id="mail-head-ui" style="display:none">
      <div class="card-name-group">
          <img src="https://upload.wikimedia.org/wikipedia/commons/d/df/Microsoft_Office_Outlook_%282018%E2%80%93present%29.svg" class="brand-icon">
          <span id="mail-subtitle">Inbox</span>
      </div>
      <div class="action-btns">
          <button class="btn-icon" onclick="loadMail()">🔄</button>
          <button class="btn-logout" onclick="logout('ms')">Logout</button>
      </div>
    </div>
    <div id="mail-body">
        <div class="auth-prompt">
            <button class="btn-fancy-login" onclick="startMSLogin()">Sign In to Outlook</button>
        </div>
    </div>
  </div>
</div>

<!-- Google Calendar -->
<div class="section" id="cal-sec">
  <div class="section-title">Google Calendar</div>
  <div class="card">
    <div class="card-head" id="cal-head-ui" style="display:none">
      <div class="card-name-group">
          <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Google_Calendar_icon_%282020%29.svg" class="brand-icon">
          <span>Schedule</span>
      </div>
      <div class="action-btns">
          <button class="btn-icon" onclick="loadGoogleCalendar()">🔄</button>
          <button class="btn-logout" onclick="logout('google')">Logout</button>
      </div>
    </div>
    <div id="cal-body">
        <div class="auth-prompt">
            <button class="btn-fancy-login" onclick="initGoogle()">Sign In to Google</button>
        </div>
    </div>
  </div>
</div>

<!-- Reminders -->
<div class="section" id="rem-sec">
  <div class="section-title">Reminders</div>
  <div class="card">
    <div class="card-head">
      <div class="card-name-group">🔔 Tasks</div>
      <button class="btn-icon" style="width:auto; padding:0 12px; font-size:12px" onclick="addNewReminder()">+ Add</button>
    </div>
    <div class="filter-bar" id="reminder-chips"></div>
    <div id="reminders-list"></div>
  </div>
</div>

<footer>
    <button class="btn-logout" style="padding:15px 30px; height:auto" onclick="fullNukeSession()">Clear All Data & Sessions</button>
</footer>

<script>
const MS_CLIENT_ID = '1155afdf-d585-48cc-af89-b973843ce21a';
const GOOGLE_CLIENT_ID = '623465337664-jf51sn11crs5bs398inc40al4ksjv1rd.apps.googleusercontent.com';
const REDIRECT = 'https://ghaziomairi93.github.io/MyDashboard/';

let msToken = sessionStorage.getItem('ms_token');
let googleToken = sessionStorage.getItem('google_token');
let allReminders = JSON.parse(localStorage.getItem('ghazi_rems')) || [];

window.onload = async () => {
    updateGreeting();
    initDayBars();
    renderReminders();
    
    // Auth Logic
    const params = new URLSearchParams(window.location.search);
    if(params.get('code')){
        const verifier = sessionStorage.getItem('pkce_verifier');
        const body = new URLSearchParams({client_id:MS_CLIENT_ID, code:params.get('code'), redirect_uri:REDIRECT, grant_type:'authorization_code', code_verifier:verifier});
        const r = await fetch('https://login.microsoftonline.com/consumers/oauth2/v2.0/token',{method:'POST',headers:{'Content-Type':'application/x-www-form-urlencoded'},body});
        const data = await r.json();
        if(data.access_token){ sessionStorage.setItem('ms_token', data.access_token); window.location.href = REDIRECT; }
    }

    if(msToken) { document.getElementById('mail-head-ui').style.display='flex'; loadMail(); getMSProfile(); }
    if(googleToken) { document.getElementById('cal-head-ui').style.display='flex'; loadGoogleCalendar(); }
};

function updateGreeting() {
    const hr = new Date().getHours();
    let greet = "Good evening";
    if(hr < 12) greet = "Good morning";
    else if(hr < 18) greet = "Good afternoon";
    
    const name = sessionStorage.getItem('user_name') || "Ghazi";
    document.getElementById('greeting-text').textContent = `${greet}, ${name}`;
    
    const now = new Date();
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    document.getElementById('greeting-sub').textContent = `${days[now.getDay()]}, ${now.toLocaleDateString('en-US', {month:'long', day:'numeric'})}`;
}

async function getMSProfile() {
    try {
        const r = await fetch("https://graph.microsoft.com/v1.0/me", { headers:{Authorization:'Bearer '+msToken}});
        const data = await r.json();
        if(data.displayName) {
            sessionStorage.setItem('user_name', data.displayName.split(' ')[0]);
            updateGreeting();
        }
    } catch(e){}
}

async function loadMail() {
    try {
        // Targeted unread inbox count logic
        const r = await fetch("https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$filter=isRead eq false&$count=true&$top=10", {
            headers:{Authorization:'Bearer '+msToken, 'ConsistencyLevel': 'eventual'}
        });
        const data = await r.json();
        const unread = data['@odata.count'] || 0;
        document.getElementById('stat-mail').textContent = unread;
        document.getElementById('mail-subtitle').textContent = unread + " New Emails";
        document.getElementById('mail-body').innerHTML = data.value.map(m => `
            <div class="list-item">
                <div style="flex:1">
                    <div style="font-size:13px; font-weight:700;">${m.from.emailAddress.name}</div>
                    <div style="font-size:12px; color:var(--muted);">${m.subject}</div>
                </div>
            </div>
        `).join('');
    } catch(e) {}
}

async function loadGoogleCalendar() {
    let start = new Date(); start.setHours(0,0,0,0);
    let end = new Date(); end.setHours(23,59,59,999);
    try {
        const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start.toISOString()}&timeMax=${end.toISOString()}&singleEvents=true&orderBy=startTime`, {
            headers: { Authorization: `Bearer ${googleToken}` }
        });
        const data = await res.json();
        const filtered = data.items.filter(ev => !ev.id.startsWith('_') && ev.eventType !== 'birthday');
        document.getElementById('stat-events').textContent = filtered.length;
        
        let html = `
            <div class="cal-input-container">
                <input type="text" class="cal-input" id="cal-title" placeholder="Event name @ time (e.g. Gym @ 6pm)">
                <button class="btn-add-cal" onclick="addGoogleEvent()">Add to Calendar</button>
            </div>
        `;
        html += filtered.map(ev => `
            <div class="list-item">
                <div style="flex:1">
                    <div style="font-size:14px; font-weight:700">${ev.summary}</div>
                    <div style="font-size:12px; color:var(--purple)">${ev.start.dateTime ? new Date(ev.start.dateTime).toLocaleTimeString([],{hour:'2-digit', minute:'2-digit'}) : 'All Day'}</div>
                </div>
                <button class="del-btn" onclick="deleteGoogleEvent('${ev.id}')">✕</button>
            </div>
        `).join('');
        document.getElementById('cal-body').innerHTML = html;
    } catch(e) {}
}

function getWeather() {
    navigator.geolocation.getCurrentPosition(async (pos) => {
        const { latitude, longitude } = pos.coords;
        const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&daily=temperature_2m_max,temperature_2m_min&timezone=auto`);
        const data = await res.json();
        document.getElementById('weather-content').innerHTML = `
            <div style="display:flex; justify-content:space-between; align-items:center; color:white">
                <div>
                    <div style="font-size:42px; font-weight:700">${Math.round(data.current_weather.temperature)}°</div>
                    <div style="font-size:14px">H:${Math.round(data.daily.temperature_2m_max[0])}° L:${Math.round(data.daily.temperature_2m_min[0])}°</div>
                </div>
                <div style="text-align:right">
                    <div style="font-size:32px">☁️</div>
                    <div style="font-size:14px; font-weight:600">Clear Sky</div>
                </div>
            </div>
        `;
    });
}

function initDayBars() {
    const days = ['Today','Friday','Saturday','Sunday','Monday','Tuesday','Wednesday'];
    document.getElementById('reminder-chips').innerHTML = days.map((d,i) => `<button class="chip ${i===0?'active':''}">${d}</button>`).join('');
}

function renderReminders() {
    const dailyList = allReminders.filter(r => r.dateKey === new Date().toDateString());
    document.getElementById('reminders-list').innerHTML = dailyList.map(r => `
        <div class="list-item">
            <div style="display:flex; align-items:center; gap:12px; flex:1">
                <input type="checkbox" ${r.done?'checked':''} onclick="toggleRem(${r.id})">
                <span style="${r.done?'text-decoration:line-through;color:var(--muted)':''}">${r.title}</span>
            </div>
            <button class="del-btn" onclick="deleteRem(${r.id})">✕</button>
        </div>
    `).join('') || '<div style="padding:40px; text-align:center; color:var(--muted)">All clear!</div>';
}

function addNewReminder() {
    const t = prompt("Task:"); if(!t) return;
    allReminders.push({ id: Date.now(), title: t, done: false, dateKey: new Date().toDateString() });
    localStorage.setItem('ghazi_rems', JSON.stringify(allReminders)); renderReminders();
}

function logout(service) {
    if(service === 'ms') sessionStorage.removeItem('ms_token');
    if(service === 'google') sessionStorage.removeItem('google_token');
    location.reload();
}

// Helper for MS Login
function base64url(buf){return btoa(String.fromCharCode(...new Uint8Array(buf))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'')}
async function sha256(str){return crypto.subtle.digest('SHA-256',new TextEncoder().encode(str))}
function randomStr(len){const arr=new Uint8Array(len);crypto.getRandomValues(arr);return base64url(arr)}
async function startMSLogin(){
  const verifier = randomStr(64); sessionStorage.setItem('pkce_verifier', verifier);
  const challenge = base64url(await sha256(verifier));
  window.location.href = `https://login.microsoftonline.com/consumers/oauth2/v2.0/authorize?client_id=${MS_CLIENT_ID}&response_type=code&redirect_uri=${encodeURIComponent(REDIRECT)}&scope=openid profile User.Read Mail.Read&code_challenge=${challenge}&code_challenge_method=S256&prompt=select_account`;
}
function initGoogle(){
  google.accounts.oauth2.initTokenClient({ client_id:GOOGLE_CLIENT_ID, scope:'https://www.googleapis.com/auth/calendar.events', prompt: 'select_account', callback:(res)=>{sessionStorage.setItem('google_token',res.access_token); location.reload();}}).requestAccessToken();
}
</script>
</body>
</html>
