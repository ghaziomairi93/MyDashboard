<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghazi Dashboard v2.1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#0F0F13;--card:#1A1A22;--card2:#22222E;--border:#2E2E3E;--text:#F0EFE9;--muted:#8A8A9A;--blue:#4F8EF7;--blue2:#1A56CC;--green:#34D399;--amber:#FBBF24;--red:#F87171;--purple:#A78BFA;--led-green:#39FF14;--nuke-bg:#b91c1c;--nuke-text:#ffffff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:15px;padding-bottom:100px;scroll-behavior:smooth}
.dashboard-grid{display:flex;flex-direction:column;gap:12px}
.top-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;height:150px}
.widget{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:15px;display:flex;flex-direction:column;justify-content:center;align-items:center;position:relative;text-align:center}
.weather-widget, .loc-widget{cursor:pointer}
.led-main{font-family:'Seven Segment',monospace;color:var(--led-green);font-size:32px;font-weight:bold;text-shadow:0 0 10px rgba(57,255,20,0.4)}
.led-ms{font-family:'Seven Segment',monospace;color:var(--led-green);font-size:14px;opacity:0.8;margin-top:-2px}
.ctx-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:8px;font-weight:700}
.temp-big{font-size:36px;font-weight:700;margin:2px 0}
.row-split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:15px;text-align:center;cursor:pointer;transition:transform 0.1s}
.stat-box:active{transform:scale(0.95)}
.stat-num{font-size:28px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:600;margin-top:4px}
.row3{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tasks-widget{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer}
.tasks-count{font-size:48px;font-weight:700;color:var(--amber);line-height:1}
.tasks-label{font-size:10px;color:var(--muted);text-transform:uppercase;font-weight:700;letter-spacing:1px;text-align:center;line-height:1.4}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden;margin-top:4px}
.card-head{padding:12px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:13px}
.day-bar{display:flex;overflow-x:auto;gap:8px;padding:10px 15px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border)}
.day-pill{padding:8px 14px;border-radius:10px;background:var(--card2);font-size:11px;font-weight:700;white-space:nowrap;color:var(--muted);border:1px solid transparent;cursor:pointer}
.day-pill.active{background:var(--blue);color:white}
.list-item, .mail-item{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:14px;text-decoration:none;color:inherit}
.task-item{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.task-cb{width:18px;height:18px;accent-color:var(--green)}
.task-title.struck{text-decoration:line-through;color:var(--muted)}
.btn-nuke{background:var(--nuke-bg);color:var(--nuke-text);border:none;padding:16px;border-radius:14px;font-weight:700;width:100%;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;margin-top:10px}

/* ‼️ FIX: Adaptive Font Color for Inputs */
input, textarea { background: var(--card2); color: CanvasText; border: 1px solid var(--border); }

.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);display:none;flex-direction:column;padding:24px;z-index:200}
.modal-overlay.active{display:flex}
.contact-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:400;padding:20px}
.contact-modal.active{display:flex}
.contact-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:22px;width:100%;max-width:400px}
</style>
</head>
<body>

<div class="dashboard-grid">
  <!-- ROW 1 -->
  <div class="top-row">
    <div class="widget weather-widget" onclick="toggleSearch()">
      <div id="w-content"><div class="ctx-label">Choose Location</div><div class="temp-big">--°</div></div>
      <div class="ctx-label" id="w-city">Tap to set</div>
    </div>
    <div class="widget">
      <div class="led-main" id="digi-hms">00:00:00</div>
      <div class="led-ms" id="digi-ms">00</div>
      <div class="ctx-label" id="c-meta">Timezone --</div>
    </div>
  </div>

  <!-- ‼️ FIX: STATS ROW WITH SCROLL NAVIGATION -->
  <div class="row-split">
    <div class="stat-box" onclick="scrollToId('outlook-section')">
      <div class="stat-num" id="stat-mail">0</div>
      <div class="stat-lbl">Unread Mail</div>
    </div>
    <div class="stat-box" onclick="scrollToId('cal-section')">
      <div class="stat-num" id="stat-events">0</div>
      <div class="stat-lbl">Events Today</div>
    </div>
  </div>

  <!-- ROW 3 -->
  <div class="row3">
    <div class="widget loc-widget" style="border-radius:20px" onclick="toggleSearch()">
      <div style="font-size:22px">📍</div>
      <div class="ctx-label">Choose Location</div>
    </div>
    <div class="tasks-widget" onclick="scrollToId('rem-section')">
      <div class="tasks-count" id="tasks-count">0</div>
      <div class="tasks-label">Uncompleted Tasks</div>
    </div>
  </div>

  <!-- CALENDAR -->
  <div class="card" id="cal-section">
    <div class="card-head">
      <span>📅 Google Calendar</span>
      <div id="google-head-btn"><button class="refresh-btn" onclick="initGoogle()">Sign In</button></div>
    </div>
    <div class="day-bar" id="cal-day-bar"></div>
    <div id="google-body"><div class="empty">Sign in to see your events</div></div>
  </div>

  <!-- REMINDERS -->
  <div class="card" id="rem-section">
    <div class="card-head">
      <span>🔔 Reminders</span>
      <button onclick="addReminder()" style="background:none;border:none;color:var(--blue);font-size:24px">+</button>
    </div>
    <div class="day-bar" id="rem-day-bar"></div>
    <div id="rem-list"></div>
  </div>

  <!-- OUTLOOK -->
  <div class="card" id="outlook-section">
    <div class="card-head">
      <span>✉️ Outlook Inbox</span>
      <div id="ms-head-btn"><button class="refresh-btn" onclick="startMSLogin()">Sign In</button></div>
    </div>
    <div id="ms-body"><div class="empty">Sign in to see your emails</div></div>
  </div>

  <button class="btn-nuke" onclick="nukeData()">🗑 Clear My Data and Sessions</button>
  <button style="padding:12px;border-radius:12px;background:var(--card);color:var(--muted);border:1px solid var(--border);margin-top:10px" onclick="showContact()">💬 Support</button>
  <div class="version-tag" id="version-tag">v2.1.0</div>
</div>

<!-- SEARCH MODAL -->
<div class="modal-overlay" id="search-modal">
  <div style="font-size:17px;font-weight:700;margin-bottom:16px">📍 Choose Location</div>
  <input type="text" class="search-input" style="width:100%;padding:14px;border-radius:12px;outline:none" placeholder="Search city..." oninput="searchCity(this.value)">
  <div id="search-results" style="margin-top:14px;display:flex;flex-direction:column;gap:10px"></div>
  <div style="margin-top:auto;text-align:center;padding:20px;color:var(--muted)" onclick="toggleSearch()">✕ Close</div>
</div>

<!-- SUPPORT MODAL -->
<div class="contact-modal" id="contact-modal">
  <div class="contact-card">
    <h3>💬 Contact Support</h3>
    <input type="text" id="contact-name" placeholder="Name" style="width:100%;padding:10px;margin:10px 0;border-radius:8px">
    <input type="email" id="contact-email" placeholder="Email" style="width:100%;padding:10px;margin:10px 0;border-radius:8px">
    <textarea id="contact-msg" placeholder="Message" style="width:100%;padding:10px;margin:10px 0;border-radius:8px;height:80px"></textarea>
    <div id="contact-status" style="text-align:center;font-size:12px;margin:5px"></div>
    <div style="display:flex;gap:10px">
      <button onclick="hideContact()" style="flex:1;padding:10px;border-radius:8px;background:var(--card2);color:var(--muted);border:1px solid var(--border)">Cancel</button>
      <button onclick="submitContact()" style="flex:1;padding:10px;border-radius:8px;background:var(--blue2);color:white;border:none">Send</button>
    </div>
  </div>
</div>

<script>
// ‼️ SETUP: CONFIG
const G_CLIENT_ID = '623465337664-jf51sn11crs5bs398inc40al4ksjv1rd.apps.googleusercontent.com';
const MS_CLIENT_ID = '1155afdf-d585-48cc-af89-b973843ce21a';
const MS_REDIRECT = 'https://ghaziomairi93.github.io/MyDashboard/';
const W3F_KEY = '53bad208-02b2-40b6-974b-98f8b68d0439'; 

let activeTZ = '', selectedDate = new Date().toDateString();
let tasks = JSON.parse(localStorage.getItem('v17_tasks')) || [];
let googleToken = localStorage.getItem('google_token');

window.onload = async () => {
  stampVersion(); initLocation(); renderDayBars(); renderTasks(); requestAnimationFrame(updateClock);
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if(code){ window.history.replaceState({}, '', MS_REDIRECT); await exchangeMSCode(code); }
  
  if(googleToken){ 
    document.getElementById('google-head-btn').innerHTML = `<button class="refresh-btn" onclick="loadCal()">↻ Refresh</button>`;
    loadCal(); 
  }
  if(localStorage.getItem('ms_token')){
    document.getElementById('ms-head-btn').innerHTML = `<button class="refresh-btn" onclick="loadMail()">↻ Refresh</button>`;
    loadMail(); loadUnreadCount();
  }
};

// ‼️ FUNCTION: APP REDIRECTS (Deep Linking)
function openGCalApp() {
  const iosUrl = "com.google.calendar://";
  const appStoreUrl = "https://apps.apple.com/app/google-calendar-get-organized/id906634342";
  const start = Date.now();
  window.location.href = iosUrl; 
  setTimeout(() => { if (Date.now() - start < 1500) window.location.href = appStoreUrl; }, 500);
}

function openMailApp() { window.location.href = "message://"; }

// ‼️ FUNCTION: SCROLL NAVIGATION
function scrollToId(id) { document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

// ‼️ FUNCTION: OUTLOOK (Total Unread)
async function loadMail(){
  const token = localStorage.getItem('ms_token');
  const res = await fetch('https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$filter=isRead eq false&$top=20', {headers:{Authorization:`Bearer ${token}`}});
  const d = await res.json();
  document.getElementById('ms-body').innerHTML = d.value.map(m => `
    <div class="mail-item" onclick="openMailApp()">
      <div style="flex:1">
        <div style="font-weight:700;font-size:13px">${m.from.emailAddress.name}</div>
        <div style="font-size:12px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${m.subject}</div>
      </div>
      <div style="font-size:11px;color:var(--blue)">Open →</div>
    </div>`).join('') || '<div class="empty">Inbox Clear!</div>';
}

async function loadUnreadCount(){
  const token = localStorage.getItem('ms_token');
  const res = await fetch('https://graph.microsoft.com/v1.0/me/mailFolders/inbox', {headers:{Authorization:`Bearer ${token}`}});
  const d = await res.json();
  // ‼️ FIX: Sets the stat box to the actual inbox total unread
  document.getElementById('stat-mail').textContent = d.unreadItemCount;
}

// ‼️ CORE UI HELPERS
function stampVersion(){ const n = new Date(); document.getElementById('version-tag').textContent = `v2.1.0 · ${n.toLocaleDateString()} ${n.toLocaleTimeString()}`; }
function toggleSearch(){ document.getElementById('search-modal').classList.toggle('active'); }
function nukeData(){ if(confirm('Clear all sessions and data?')){ localStorage.clear(); location.reload(); } }

async function searchCity(v){
  if(v.length < 2) return;
  const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(v)}&count=5`);
  const d = await r.json();
  document.getElementById('search-results').innerHTML = (d.results||[]).map(c =>
    `<div style="padding:14px;background:var(--card2);border-radius:12px;border:1px solid var(--border);cursor:pointer" onclick="setLoc(${c.latitude},${c.longitude},'${c.name.replace(/'/g,"\\'")}','${c.timezone}')"><b>${c.name}</b>, ${c.country}</div>`
  ).join('');
}

function setLoc(lat, lon, name, tz){ localStorage.setItem('v16_loc', JSON.stringify({lat, lon, name, tz})); location.reload(); }

function initLocation(){
  const loc = JSON.parse(localStorage.getItem('v16_loc'));
  if(loc){ activeTZ = loc.tz; fetchWeather(loc.lat, loc.lon, loc.name); }
}

async function fetchWeather(lat, lon, name){
  const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
  const d = await r.json();
  document.getElementById('w-content').innerHTML = `<div class="ctx-label">Current</div><div class="temp-big">${Math.round(d.current_weather.temperature)}°</div>`;
  document.getElementById('w-city').textContent = name;
}

function updateClock(){
  if(!activeTZ) return requestAnimationFrame(updateClock);
  const now = new Date(), pad = n => n.toString().padStart(2,'0');
  const loc = new Date(now.toLocaleString('en-US',{timeZone:activeTZ}));
  loc.setMilliseconds(now.getMilliseconds());
  document.getElementById('digi-hms').textContent = `${pad(loc.getHours())}:${pad(loc.getMinutes())}:${pad(loc.getSeconds())}`;
  document.getElementById('digi-ms').textContent = Math.floor(loc.getMilliseconds()/10).toString().padStart(2,'0');
  const tz = now.toLocaleTimeString('en-US',{timeZone:activeTZ,timeZoneName:'short'}).split(' ').pop();
  document.getElementById('c-meta').textContent = loc.toLocaleDateString('en-US',{month:'short',day:'numeric'}) + ' · ' + tz;
  requestAnimationFrame(updateClock);
}

function renderDayBars(){
  const days = [];
  for(let i=0;i<7;i++){ const d=new Date(); d.setDate(d.getDate()+i); days.push({label:d.toLocaleDateString('en-US',{weekday:'short',day:'numeric'}),key:d.toDateString()}); }
  ['cal-day-bar','rem-day-bar'].forEach(id => {
    document.getElementById(id).innerHTML = days.map(d => `<div class="day-pill ${d.key===selectedDate?'active':''}" onclick="selectDay('${d.key}')">${d.label}</div>`).join('');
  });
}

function selectDay(key){ selectedDate=key; renderDayBars(); renderTasks(); if(googleToken) loadCal(); }

function renderTasks(){
  const all = tasks.filter(t => t.dateKey === selectedDate);
  document.getElementById('tasks-count').textContent = all.filter(t => !t.done).length;
  document.getElementById('rem-list').innerHTML = all.map(t => `
    <div class="task-item">
      <input type="checkbox" class="task-cb" ${t.done?'checked':''} onchange="toggleTask(${t.id}, this.checked)">
      <span class="task-title ${t.done?'struck':''}">${t.title}</span>
    </div>`).join('') || '<div class="empty">No tasks</div>';
}

function toggleTask(id, checked){ tasks = tasks.map(t => t.id===id ? {...t, done:checked} : t); localStorage.setItem('v17_tasks', JSON.stringify(tasks)); renderTasks(); }
function addReminder(){ const v = prompt('Task:'); if(v){ tasks.push({id:Date.now(),title:v,done:false,dateKey:selectedDate}); localStorage.setItem('v17_tasks',JSON.stringify(tasks)); renderTasks(); } }

// SUPPORT LOGIC
function showContact(){ document.getElementById('contact-modal').classList.add('active'); }
function hideContact(){ document.getElementById('contact-modal').classList.remove('active'); }
async function submitContact(){
  const n=document.getElementById('contact-name').value, e=document.getElementById('contact-email').value, m=document.getElementById('contact-msg').value;
  if(!n||!e||!m) return;
  await fetch('https://api.web3forms.com/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({access_key:W3F_KEY,name:n,email:e,message:m})});
  document.getElementById('contact-status').textContent="✅ Sent!";
  setTimeout(hideContact, 1500);
}

// CALENDAR LOGIC
function initGoogle(){
  google.accounts.oauth2.initTokenClient({
    client_id: G_CLIENT_ID, scope: 'https://www.googleapis.com/auth/calendar.readonly',
    callback: res => { localStorage.setItem('google_token', res.access_token); location.reload(); }
  }).requestAccessToken();
}
async function loadCal(){
  const s = new Date(selectedDate);
  const start = new Date(s.setHours(0,0,0,0)).toISOString();
  const end = new Date(s.setHours(23,59,59,999)).toISOString();
  const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${start}&timeMax=${end}`, {headers:{Authorization:`Bearer ${googleToken}`}});
  const d = await res.json();
  document.getElementById('stat-events').textContent = (d.items||[]).length;
  document.getElementById('google-body').innerHTML = (d.items||[]).map(e => `
    <div class="list-item" onclick="openGCalApp()">
      <div>
        <div style="font-weight:600">${e.summary}</div>
        <div style="font-size:11px;color:var(--muted)">${e.start.dateTime ? new Date(e.start.dateTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'All Day'}</div>
      </div>
      <div style="font-size:11px;color:var(--purple)">Open →</div>
    </div>`).join('') || '<div class="empty">No events today.</div>';
}
</script>
</body>
</html>
