<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghazi's Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
*{box-sizing:border-box;margin:0;padding:0; -webkit-tap-highlight-color: transparent;}
:root{--bg:#0F0F13;--card:#1A1A22;--card2:#22222E;--border:#2E2E3E;--text:#F0EFE9;--muted:#8A8A9A;--blue:#4F8EF7;--blue2:#1A56CC;--green:#34D399;--amber:#FBBF24;--red:#F87171;--purple:#A78BFA}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:50px;scroll-behavior: smooth;}
header{padding:20px;background:rgba(15,15,19,0.95);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.logo{font-family:'Playfair Display',serif;font-size:20px}.logo span{color:var(--blue)}
.greeting{padding:24px 20px 0}
.greeting h1{font-family:'Playfair Display',serif;font-size:28px;margin-bottom:4px}
.greeting p{font-size:13px;color:var(--muted)}

/* Redesigned Stat Cards */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 20px 0}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:16px;cursor:pointer;transition:transform 0.1s;display:flex;flex-direction:column;gap:8px}
.stat-card:active{transform:scale(0.97)}
.stat-header{display:flex;justify-content:space-between;align-items:center}
.stat-icon-wrap{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}
.stat-val{font-size:24px;font-weight:700}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px}

.section{padding:20px 20px 0}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:16px}
.card-head{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-title-wrap{display:flex;align-items:center;gap:10px}
.card-action{font-size:12px;color:var(--text);background:var(--card2);border:1px solid var(--border);padding:6px 12px;border-radius:8px;cursor:pointer;font-weight:500;display:flex;align-items:center;gap:4px}
.btn-login{background:var(--blue2);border:none;color:white}
.btn-logout{color:var(--red)}

.mail-item{padding:12px 16px;border-bottom:1px solid var(--border);display:block;text-decoration:none;color:inherit}
.cal-input-container{padding:12px;display:flex;gap:8px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--border)}
.cal-input{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:white;font-size:13px}
.btn-add-cal{background:var(--purple);color:white;border:none;padding:0 15px;border-radius:8px;font-weight:600;font-size:12px}

/* Reminder Filters */
.filter-bar{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none}
.chip{font-size:11px;padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);white-space:nowrap}
.chip.active{background:var(--blue2);color:white;border-color:var(--blue2)}

.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(5px)}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;width:90%;max-width:400px;padding:20px}
</style>
</head>
<body>

<header>
  <div class="logo">G<span>.</span>Dashboard</div>
  <div id="ms-auth-header">
     <button class="card-action btn-login" id="ms-login-btn" onclick="startLogin()">Sign in Outlook</button>
  </div>
</header>

<div class="greeting">
  <h1 id="greeting-text">Good afternoon, Ghazi</h1>
  <p id="greeting-sub"></p>
</div>

<div class="stats">
  <div class="stat-card" onclick="document.getElementById('cal-sec').scrollIntoView()">
    <div class="stat-header">
        <div class="stat-icon-wrap" style="background:rgba(167,139,250,0.15);color:var(--purple)">📅</div>
        <div class="stat-val" id="stat-events">0</div>
    </div>
    <div class="stat-label">Events Today</div>
  </div>
  <div class="stat-card" onclick="document.getElementById('mail-sec').scrollIntoView()">
    <div class="stat-header">
        <div class="stat-icon-wrap" style="background:rgba(79,142,247,0.15);color:var(--blue)">✉️</div>
        <div class="stat-val" id="stat-mail">0</div>
    </div>
    <div class="stat-label">Unread Emails</div>
  </div>
  <div class="stat-card" onclick="document.getElementById('rem-sec').scrollIntoView()">
    <div class="stat-header">
        <div class="stat-icon-wrap" style="background:rgba(251,191,36,0.15);color:var(--amber)">🔔</div>
        <div class="stat-val" id="stat-reminders">0</div>
    </div>
    <div class="stat-label">Active Tasks</div>
  </div>
  <div class="stat-card" onclick="document.getElementById('rem-sec').scrollIntoView()">
    <div class="stat-header">
        <div class="stat-icon-wrap" style="background:rgba(52,211,153,0.15);color:var(--green)">✅</div>
        <div class="stat-val" id="stat-done">0</div>
    </div>
    <div class="stat-label">Completed</div>
  </div>
</div>

<div class="section" id="mail-sec">
  <div class="section-title">Outlook Inbox</div>
  <div class="card">
    <div class="card-head">
      <div class="card-name">Top 10 Emails</div>
      <div style="display:flex;gap:8px">
          <button class="card-action" onclick="loadMail()">Refresh</button>
          <button class="card-action btn-logout" id="ms-logout-btn" style="display:none" onclick="logoutMS()">Logout</button>
      </div>
    </div>
    <div id="mail-body"><div class="empty" style="padding:20px;text-align:center;color:var(--muted)">Connect to view mail</div></div>
  </div>
</div>

<div class="section" id="cal-sec">
  <div class="section-title">Google Calendar</div>
  <div class="card">
    <div class="card-head">
      <div class="card-name">Schedule</div>
      <div style="display:flex;gap:8px">
          <button class="card-action" id="google-refresh" style="display:none" onclick="loadGoogleCalendar()">Refresh</button>
          <button class="card-action btn-login" id="google-login-btn" onclick="initGoogle()">Connect</button>
          <button class="card-action btn-logout" id="google-logout-btn" style="display:none" onclick="logoutGoogle()">Logout</button>
      </div>
    </div>
    <div class="cal-input-container" id="cal-input-ui" style="display:none">
        <input type="text" class="cal-input" id="cal-title" placeholder="Dinner at 08:00 PM">
        <button class="btn-add-cal" onclick="addGoogleEvent()">Add</button>
    </div>
    <div id="events-list"></div>
  </div>
</div>

<div class="section" id="rem-sec">
  <div class="section-title">Reminders</div>
  <div class="card">
    <div class="card-head">
      <div class="card-name">Next 5 Days</div>
      <button class="card-action btn-login" onclick="addNewReminder()">+ Add Task</button>
    </div>
    <div class="filter-bar" id="reminder-chips"></div>
    <div id="reminders-list"></div>
  </div>
</div>

<script>
// --- AUTH CONFIG ---
const MS_CLIENT_ID = '1155afdf-d585-48cc-af89-b973843ce21a';
const GOOGLE_CLIENT_ID = '623465337664-jf51sn11crs5bs398inc40al4ksjv1rd.apps.googleusercontent.com';
const REDIRECT_URI = window.location.origin + window.location.pathname;

let msToken = sessionStorage.getItem('ms_token');
let googleToken = sessionStorage.getItem('google_token');

window.onload = () => {
    updateDate();
    initReminderChips();
    renderReminders();
    if(msToken) {
        document.getElementById('ms-login-btn').style.display='none';
        document.getElementById('ms-logout-btn').style.display='block';
        loadMail();
    }
    if(googleToken) {
        setupGoogleUI(true);
        loadGoogleCalendar();
    }
};

function updateDate() {
    const now = new Date();
    document.getElementById('greeting-sub').textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
}

// --- OUTLOOK ---
function startLogin() {
    const url = `https://login.microsoftonline.com/consumers/oauth2/v2.0/authorize?client_id=${MS_CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=Mail.Read&response_mode=fragment`;
    window.location.href = url;
}

// Simple fragment parser for demo
if(window.location.hash) {
    const params = new URLSearchParams(window.location.hash.substring(1));
    if(params.get('access_token')) {
        sessionStorage.setItem('ms_token', params.get('access_token'));
        window.location.hash = "";
        location.reload();
    }
}

async function loadMail() {
    const el = document.getElementById('mail-body');
    try {
        const res = await fetch("https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$top=10&$count=true", {
            headers: { Authorization: `Bearer ${msToken}`, 'ConsistencyLevel': 'eventual' }
        });
        const data = await res.json();
        document.getElementById('stat-mail').textContent = data['@odata.count'] || 0;
        el.innerHTML = data.value.map(m => `
            <a href="ms-outlook://emails/${m.id}" class="mail-item" onclick="setTimeout(()=>window.location.href='https://outlook.live.com', 1000)">
                <div style="font-size:13px; font-weight:600; margin-bottom:4px">${m.from.emailAddress.name}</div>
                <div style="font-size:12px; color:var(--muted)">${m.subject}</div>
            </a>
        `).join('');
    } catch(e) { el.innerHTML = '<div class="empty">Error loading mail</div>'; }
}

function logoutMS() { sessionStorage.removeItem('ms_token'); location.reload(); }

// --- GOOGLE ---
function initGoogle() {
    google.accounts.oauth2.initTokenClient({
        client_id: GOOGLE_CLIENT_ID,
        scope: 'https://www.googleapis.com/auth/calendar.events https://www.googleapis.com/auth/calendar.readonly',
        callback: (res) => {
            googleToken = res.access_token;
            sessionStorage.setItem('google_token', googleToken);
            setupGoogleUI(true);
            loadGoogleCalendar();
        }
    }).requestAccessToken();
}

function setupGoogleUI(loggedIn) {
    document.getElementById('google-login-btn').style.display = loggedIn ? 'none' : 'block';
    document.getElementById('google-logout-btn').style.display = loggedIn ? 'block' : 'none';
    document.getElementById('google-refresh').style.display = loggedIn ? 'block' : 'none';
    document.getElementById('cal-input-ui').style.display = loggedIn ? 'flex' : 'none';
}

async function loadGoogleCalendar() {
    const el = document.getElementById('events-list');
    try {
        const res = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${new Date().toISOString()}`, {
            headers: { Authorization: `Bearer ${googleToken}` }
        });
        const data = await res.json();
        document.getElementById('stat-events').textContent = data.items.length;
        el.innerHTML = data.items.map(ev => `
            <div style="padding:12px; border-bottom:1px solid var(--border); cursor:pointer" onclick="window.location.href='com.google.calendar://'">
                <div style="font-size:13px; font-weight:600">${ev.summary}</div>
                <div style="font-size:11px; color:var(--purple)">${new Date(ev.start.dateTime || ev.start.date).toLocaleTimeString()}</div>
            </div>
        `).join('');
    } catch(e) {}
}

async function addGoogleEvent() {
    const titleStr = document.getElementById('cal-title').value;
    if(!titleStr) return;
    // Logic to parse time would go here - simplified for demo
    await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${googleToken}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ summary: titleStr, start: { dateTime: new Date().toISOString() }, end: { dateTime: new Date(Date.now()+3600000).toISOString() } })
    });
    document.getElementById('cal-title').value = '';
    loadGoogleCalendar();
}

function logoutGoogle() { sessionStorage.removeItem('google_token'); location.reload(); }

// --- REMINDERS ---
let reminders = JSON.parse(localStorage.getItem('reminders')) || [];
function initReminderChips() {
    const days = ['Today', 'Tomorrow', 'Saturday', 'Sunday', 'Monday'];
    document.getElementById('reminder-chips').innerHTML = days.map((d, i) => `
        <button class="chip ${i===0?'active':''}" onclick="filterReminders(${i})">${d}</button>
    `).join('');
}

function renderReminders() {
    const list = document.getElementById('reminders-list');
    document.getElementById('stat-reminders').textContent = reminders.filter(r => !r.done).length;
    document.getElementById('stat-done').textContent = reminders.filter(r => r.done).length;
    list.innerHTML = reminders.map(r => `
        <div style="padding:12px; display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border)">
            <input type="checkbox" ${r.done?'checked':''} onclick="toggleRem(${r.id})">
            <span style="${r.done?'text-decoration:line-through;color:var(--muted)':''}">${r.title}</span>
        </div>
    `).join('');
}

function addNewReminder() {
    const t = prompt("Task name:");
    if(t) {
        reminders.push({id: Date.now(), title: t, done: false});
        localStorage.setItem('reminders', JSON.stringify(reminders));
        renderReminders();
    }
}

function toggleRem(id) {
    const r = reminders.find(x => x.id === id);
    r.done = !r.done;
    localStorage.setItem('reminders', JSON.stringify(reminders));
    renderReminders();
}
</script>
</body>
</html>
