<!-- 
  DASHBOARD VERSION: v1.5
  Date: 19.03.2026
  
  CHANGELOG:
  - Weather: Manual 3-city search via Geocoding API. Background adapts to time-of-day (Sunrise/Day/Sunset/Night).
  - Time Engine: Analog & Digital 7-segment clocks synchronized to the chosen city's timezone.
  - Links Fix: Added iOS deep links (message://, ms-outlook://, comgooglecalendar://).
  - Add to Calendar: Fixed using Google Calendar URL templating.
  - Data Filtering: Reminders strictly show Today's uncompleted tasks.
  - UI Layout: Restructured 6-row layout per user specifications.
  - Footer: Red "Clear Data" Nuke Button.
-->

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghazi Dashboard v1.5</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#0F0F13;--card:#1A1A22;--card2:#22222E;--border:#2E2E3E;--text:#F0EFE9;--muted:#8A8A9A;--blue:#4F8EF7;--led-green:#39FF14;--nuke-bg:#450a0a;--nuke-text:#fca5a5}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:20px;padding-bottom:60px}

header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.logo{font-family:'Playfair Display',serif;font-size:22px;font-weight:700}.logo span{color:var(--blue)}

/* Layout Grids */
.dashboard-grid{display:flex;flex-direction:column;gap:16px}
.row-split{display:grid;grid-template-columns:1fr 1fr;gap:12px}

/* Weather Card & Backgrounds */
.weather-card{border-radius:24px;padding:25px;position:relative;overflow:hidden;transition:background 1s ease;min-height:140px;display:flex;flex-direction:column;justify-content:center}
.bg-day{background:linear-gradient(135deg,#1A56CC,#4F8EF7)}
.bg-night{background:linear-gradient(135deg,#0a0a12,#16162b)}
.bg-sunrise{background:linear-gradient(135deg,#ff7e5f,#feb47b);color:#111}
.bg-sunset{background:linear-gradient(135deg,#ff4e50,#f9d423);color:#111}

/* Location Search */
.search-modal{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;padding:20px;z-index:10;color:white}
.search-input{width:100%;background:var(--card2);border:1px solid var(--border);color:white;padding:12px;border-radius:12px;outline:none;font-size:14px}
.search-results{margin-top:10px;display:flex;flex-direction:column;gap:8px}
.city-item{padding:12px;background:var(--card);border-radius:10px;font-size:14px;border:1px solid var(--border);cursor:pointer}

/* Clock Container */
.clock-container{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px}
/* Analog Clock (Apple Style) */
.analog-clock{width:80px;height:80px;border-radius:50%;background:white;position:relative;border:4px solid #f0f0f0;box-shadow:inset 0 0 5px rgba(0,0,0,0.2)}
.hand{position:absolute;bottom:50%;left:50%;transform-origin:bottom;border-radius:4px;transform:translateX(-50%)}
.hour-hand{width:4px;height:22px;background:black;z-index:2}
.min-hand{width:3px;height:32px;background:black;z-index:3}
.sec-hand{width:1.5px;height:35px;background:#FF9500;z-index:4}
.clock-center{position:absolute;top:50%;left:50%;width:6px;height:6px;background:#FF9500;border-radius:50%;transform:translate(-50%,-50%);z-index:5}
/* Digital Clock */
.digital-clock{font-family:'Seven Segment',monospace;color:var(--led-green);font-size:18px;letter-spacing:1px;text-shadow:0 0 8px rgba(57,255,20,0.4)}

/* Stats Box */
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.stat-num{font-size:36px;font-weight:700;margin-bottom:4px}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:600}

/* General Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;overflow:hidden}
.card-head{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:14px}
.list-item{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;cursor:pointer}

/* Inputs & Buttons */
.cal-input-group{padding:16px;display:flex;gap:10px;background:rgba(255,255,255,0.02);border-bottom:1px solid var(--border)}
.input-field{flex:1;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px;color:white;font-size:14px;outline:none}
.btn-primary{background:var(--blue);color:white;border:none;padding:0 16px;border-radius:10px;font-weight:600;cursor:pointer}
.btn-add-sq{width:32px;height:32px;border-radius:8px;background:var(--card2);border:1px solid var(--border);color:var(--text);font-weight:bold;cursor:pointer}
.btn-nuke{background:var(--nuke-bg);color:var(--nuke-text);border:none;padding:18px;border-radius:16px;font-weight:700;font-size:14px;cursor:pointer;width:100%;margin-top:20px}
</style>
</head>
<body>

<header>
    <div class="logo">G<span>.</span>Dashboard <span style="font-size:10px;color:var(--muted);font-family:Inter">v1.5</span></div>
</header>

<div class="dashboard-grid">
    
    <!-- 1. Weather Card (Top) -->
    <div class="weather-card bg-day" id="weather-main">
        <div id="weather-ui">
            <div style="font-weight:700;font-size:14px;opacity:0.9;text-transform:uppercase;letter-spacing:1px">Weather</div>
            <div id="w-temp" style="font-size:48px;font-weight:700;margin:5px 0">--°</div>
            <div id="w-loc" style="font-size:16px;font-weight:600">Loading...</div>
            <div style="font-size:12px;opacity:0.8;margin-top:8px;text-decoration:underline" onclick="toggleSearch()">Where would you like to see the weather? (Tap to change)</div>
        </div>
        
        <!-- Search Overlay -->
        <div class="search-modal" id="search-modal">
            <div style="font-size:14px;font-weight:600;margin-bottom:10px">Search City</div>
            <input type="text" class="search-input" placeholder="Type city name..." oninput="searchCity(this.value)">
            <div class="search-results" id="search-results"></div>
            <div style="margin-top:auto;text-align:center;font-size:14px;color:var(--muted);padding:10px" onclick="toggleSearch()">Cancel</div>
        </div>
    </div>

    <!-- 2. Row 2: Clock & Tasks -->
    <div class="row-split">
        <div class="clock-container">
            <div class="analog-clock">
                <div class="hand hour-hand" id="hr-hand"></div>
                <div class="hand min-hand" id="mn-hand"></div>
                <div class="hand sec-hand" id="sc-hand"></div>
                <div class="clock-center"></div>
            </div>
            <div class="digital-clock" id="digi-clock">00:00:00:00</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="stat-tasks">0</div>
            <div class="stat-lbl">Tasks To-Do</div>
        </div>
    </div>

    <!-- 3. Row 3: Mail & Event Stats -->
    <div class="row-split">
        <div class="stat-box">
            <div class="stat-num" id="stat-mail">0</div>
            <div class="stat-lbl">Unread Mail</div>
        </div>
        <div class="stat-box">
            <div class="stat-num" id="stat-events">0</div>
            <div class="stat-lbl">Events Today</div>
        </div>
    </div>

    <!-- 4. Google Calendar -->
    <div class="card">
        <div class="card-head">
            <div style="display:flex;gap:10px;align-items:center">📅 Google Calendar</div>
        </div>
        <div class="cal-input-group" id="cal-auth-ui" style="display:none">
            <input type="text" id="new-ev-text" class="input-field" placeholder="Gym @ 6pm">
            <button class="btn-primary" onclick="addGoogleEvent()">Add</button>
        </div>
        <div id="google-body">
            <div style="padding:30px;text-align:center"><button class="btn-primary" style="padding:12px 24px" onclick="initGoogle()">Sign In</button></div>
        </div>
    </div>

    <!-- 5. Reminders -->
    <div class="card">
        <div class="card-head">
            <div style="display:flex;gap:10px;align-items:center">🔔 Reminders</div>
            <button class="btn-add-sq" onclick="addReminder()">+</button>
        </div>
        <div id="rem-list"></div>
    </div>

    <!-- 6. Outlook -->
    <div class="card">
        <div class="card-head">
            <div style="display:flex;gap:10px;align-items:center">✉️ Outlook Inbox</div>
        </div>
        <div id="ms-body">
            <div style="padding:30px;text-align:center"><button class="btn-primary" style="padding:12px 24px" onclick="startMSLogin()">Sign In</button></div>
        </div>
    </div>

    <!-- 7. Footer Nuke Button -->
    <button class="btn-nuke" onclick="nukeData()">Clear my Data and Sessions from Dashboard</button>

</div>

<script>
let activeTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;
let msT = sessionStorage.getItem('ms_token');
let ggT = sessionStorage.getItem('google_token');
let tasks = JSON.parse(localStorage.getItem('v15_tasks')) || [];
let searchTimer;

window.onload = () => {
    initLocation();
    renderTasks();
    if(ggT) { document.getElementById('cal-auth-ui').style.display='flex'; loadCal(); }
    if(msT) loadMail();
    
    // Sync clocks exactly to screen refresh rate for smooth MS
    requestAnimationFrame(updateClocks);
};

// --- Time & Weather Engine ---
function initLocation() {
    const saved = JSON.parse(localStorage.getItem('v15_loc'));
    if(saved) fetchWeather(saved.lat, saved.lon, saved.name, saved.tz);
    else fetchWeather(51.5074, -0.1278, "London", "Europe/London"); // Default Fallback
}

function toggleSearch() {
    const m = document.getElementById('search-modal');
    m.style.display = m.style.display === 'flex' ? 'none' : 'flex';
}

async function searchCity(val) {
    if(val.length < 2) return;
    clearTimeout(searchTimer);
    searchTimer = setTimeout(async () => {
        const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${val}&count=3&language=en&format=json`);
        const d = await r.json();
        document.getElementById('search-results').innerHTML = d.results ? d.results.map(c => `
            <div class="city-item" onclick="saveLoc(${c.latitude}, ${c.longitude}, '${c.name}', '${c.timezone}')">
                ${c.name}, ${c.country}
            </div>
        `).join('') : '<div class="city-item">No results</div>';
    }, 400);
}

function saveLoc(lat, lon, name, tz) {
    localStorage.setItem('v15_loc', JSON.stringify({lat, lon, name, tz}));
    toggleSearch();
    fetchWeather(lat, lon, name, tz);
}

async function fetchWeather(lat, lon, name, tz) {
    activeTZ = tz || Intl.DateTimeFormat().resolvedOptions().timeZone;
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&daily=sunrise,sunset&timezone=${activeTZ}`);
    const d = await r.json();
    
    document.getElementById('w-temp').textContent = Math.round(d.current_weather.temperature) + '°';
    document.getElementById('w-loc').textContent = name;
    
    // Dynamic Background Logic based on exact location time
    const localTime = getTZDate(activeTZ);
    const sunrise = new Date(d.daily.sunrise[0]);
    const sunset = new Date(d.daily.sunset[0]);
    const card = document.getElementById('weather-main');
    
    card.className = 'weather-card ';
    if (Math.abs(localTime - sunrise) < 3600000) card.className += 'bg-sunrise';
    else if (Math.abs(localTime - sunset) < 3600000) card.className += 'bg-sunset';
    else if (localTime > sunrise && localTime < sunset) card.className += 'bg-day';
    else card.className += 'bg-night';
}

function getTZDate(tz) {
    const n = new Date();
    const d = new Date(n.toLocaleString('en-US', { timeZone: tz }));
    d.setMilliseconds(n.getMilliseconds());
    return d;
}

function updateClocks() {
    const t = getTZDate(activeTZ);
    
    // Digital
    const h = t.getHours().toString().padStart(2,'0');
    const m = t.getMinutes().toString().padStart(2,'0');
    const s = t.getSeconds().toString().padStart(2,'0');
    const ms = Math.floor(t.getMilliseconds()/10).toString().padStart(2,'0');
    document.getElementById('digi-clock').textContent = `${h}:${m}:${s}:${ms}`;
    
    // Analog (Smooth Sweep)
    const secDeg = (t.getSeconds() + t.getMilliseconds()/1000) * 6;
    const minDeg = t.getMinutes() * 6 + (t.getSeconds()/10);
    const hrDeg = (t.getHours()%12) * 30 + (t.getMinutes()/2);
    
    document.getElementById('sc-hand').style.transform = `translateX(-50%) rotate(${secDeg}deg)`;
    document.getElementById('mn-hand').style.transform = `translateX(-50%) rotate(${minDeg}deg)`;
    document.getElementById('hr-hand').style.transform = `translateX(-50%) rotate(${hrDeg}deg)`;
    
    requestAnimationFrame(updateClocks);
}

// --- Reminders (Today Uncompleted Only) ---
function renderTasks() {
    const today = new Date().toDateString();
    // Filter strictly for today and NOT done
    let activeTasks = tasks.filter(t => t.dateKey === today && !t.done);
    
    document.getElementById('stat-tasks').textContent = activeTasks.length;
    document.getElementById('rem-list').innerHTML = activeTasks.length ? activeTasks.map(t => `
        <div class="list-item">
            <div style="display:flex;align-items:center;gap:12px">
                <input type="checkbox" style="width:18px;height:18px" onclick="checkTask(${t.id})">
                <span style="font-size:14px;font-weight:500">${t.title}</span>
            </div>
        </div>
    `).join('') : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No tasks for today!</div>';
}

function addReminder() {
    const val = prompt("Enter task for today:");
    if(val) {
        tasks.push({id: Date.now(), title: val, done: false, dateKey: new Date().toDateString()});
        localStorage.setItem('v15_tasks', JSON.stringify(tasks));
        renderTasks();
    }
}

function checkTask(id) {
    const idx = tasks.findIndex(x => x.id === id);
    if(idx > -1) tasks[idx].done = true;
    localStorage.setItem('v15_tasks', JSON.stringify(tasks));
    renderTasks();
}

// --- Google Calendar & Deep Linking ---
async function loadCal() {
    let s = new Date(); s.setHours(0,0,0,0);
    let e = new Date(); e.setHours(23,59,59,999);
    try {
        const r = await fetch(`https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin=${s.toISOString()}&timeMax=${e.toISOString()}&singleEvents=true&orderBy=startTime`, {
            headers: { Authorization: `Bearer ${ggT}` }
        });
        const d = await r.json();
        const items = d.items.filter(i => !i.id.startsWith('_'));
        document.getElementById('stat-events').textContent = items.length;
        
        document.getElementById('google-body').innerHTML = items.length ? items.map(i => `
            <div class="list-item" onclick="window.location.href='comgooglecalendar://'">
                <div>
                    <div style="font-size:14px;font-weight:600">${i.summary}</div>
                    <div style="font-size:12px;color:var(--blue);margin-top:2px">${i.start.dateTime ? new Date(i.start.dateTime).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : 'All Day'}</div>
                </div>
            </div>
        `).join('') : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Schedule clear.</div>';
    } catch(err) {}
}

function addGoogleEvent() {
    const text = document.getElementById('new-ev-text').value;
    if(!text) return;
    // URL Template Injection for mobile browsers
    window.open(`https://calendar.google.com/calendar/render?action=TEMPLATE&text=${encodeURIComponent(text)}`);
    document.getElementById('new-ev-text').value = '';
}

// --- Outlook & Deep Linking ---
async function loadMail() {
    try {
        const r = await fetch("https://graph.microsoft.com/v1.0/me/mailFolders/inbox/messages?$filter=isRead eq false&$top=5", {
            headers:{Authorization:'Bearer '+msT, 'ConsistencyLevel':'eventual'}
        });
        const d = await r.json();
        document.getElementById('stat-mail').textContent = d.value.length || 0;
        
        document.getElementById('ms-body').innerHTML = d.value.length ? d.value.map(m => `
            <div class="list-item" onclick="window.location.href='message://'">
                <div>
                    <div style="font-size:14px;font-weight:600">${m.from.emailAddress.name}</div>
                    <div style="font-size:12px;color:var(--muted);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:250px">${m.subject}</div>
                </div>
            </div>
        `).join('') : '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">Inbox zero!</div>';
    } catch(err) {}
}

// --- Auth & System ---
function initGoogle(){
    google.accounts.oauth2.initTokenClient({client_id:'623465337664-jf51sn11crs5bs398inc40al4ksjv1rd.apps.googleusercontent.com',scope:'https://www.googleapis.com/auth/calendar.events',callback:(r)=>{sessionStorage.setItem('google_token',r.access_token);location.reload();}}).requestAccessToken();
}
function startMSLogin(){
    window.location.href = `https://login.microsoftonline.com/consumers/oauth2/v2.0/authorize?client_id=1155afdf-d585-48cc-af89-b973843ce21a&response_type=code&redirect_uri=${encodeURIComponent('https://ghaziomairi93.github.io/MyDashboard/')}&scope=openid profile User.Read Mail.Read`;
}
function nukeData() {
    if(confirm("Are you sure you want to clear all data and log out?")) {
        sessionStorage.clear();
        localStorage.clear();
        location.reload();
    }
}
</script>
</body>
</html>
