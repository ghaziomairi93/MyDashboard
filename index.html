<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Ghazi Dashboard v2.2.0 (Sensei's Release)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root{--bg:#0F0F13;--card:#1A1A22;--card2:#22222E;--border:#2E2E3E;--text:#F0EFE9;--muted:#8A8A9A;--blue:#4F8EF7;--blue2:#1A56CC;--green:#34D399;--amber:#FBBF24;--red:#F87171;--purple:#A78BFA;--led-green:#39FF14;--nuke-bg:#7f1d1d;--nuke-text:#ffffff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:#0F0F13;color:#F0EFE9;padding:15px;padding-bottom:100px;scroll-behavior:smooth}
.dashboard-grid{display:flex;flex-direction:column;gap:12px}

/* TOP ROW */
.top-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.widget{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;padding:15px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;overflow:hidden;min-height:140px;width:100%}
.weather-widget{cursor:pointer}
.led-main{font-family:'Seven Segment',monospace;color:#39FF14;font-size:32px;font-weight:bold;text-shadow:0 0 10px rgba(57,255,20,0.4)}
.led-ms{font-family:'Seven Segment',monospace;color:#39FF14;font-size:14px;opacity:0.8;margin-top:-2px}
.ctx-label{font-size:10px;color:#8A8A9A;text-transform:uppercase;letter-spacing:1px;margin-top:8px;font-weight:700}
.temp-big{font-size:36px;font-weight:700;margin:2px 0}

/* STATS ROW */
.row-split{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat-box{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;padding:15px;text-align:center;cursor:pointer;transition:transform 0.1s;overflow:hidden;min-height:100px}
.stat-box:active{transform:scale(0.95)}
.stat-num{font-size:28px;font-weight:700}
.stat-lbl{font-size:10px;color:#8A8A9A;text-transform:uppercase;font-weight:600;margin-top:4px}

/* ROW 3 */
.row3{display:grid;grid-template-columns:1fr 1fr;gap:10px}

/* COUNTDOWN WIDGET */
.countdown-widget{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;padding:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-height:140px;width:100%}
.cd-label{font-size:9px;color:#8A8A9A;text-transform:uppercase;font-weight:700;letter-spacing:1px}
.cd-event-name{font-size:12px;font-weight:700;color:#FBBF24;text-align:center;line-height:1.3;margin-bottom:2px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cd-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:4px;width:100%;margin-top:2px}
.cd-unit{background:#22222E;border-radius:8px;padding:5px 2px;text-align:center}
.cd-num{font-family:'Seven Segment',monospace;font-size:15px;color:#39FF14;text-shadow:0 0 6px rgba(57,255,20,0.3)}
.cd-unit-lbl{font-size:7px;color:#8A8A9A;text-transform:uppercase;font-weight:700;margin-top:1px}
.cd-add-btn{background:rgba(79,142,247,0.15);color:#4F8EF7;border:1px solid rgba(79,142,247,0.3);padding:8px 14px;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;width:100%;margin-top:4px}

/* TASKS WIDGET */
.tasks-widget{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;padding:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;min-height:140px;width:100%}
.tasks-count{font-size:48px;font-weight:700;color:#FBBF24;line-height:1}
.tasks-label{font-size:10px;color:#8A8A9A;text-transform:uppercase;font-weight:700;letter-spacing:1px;text-align:center;line-height:1.4}

/* QUOTE WIDGET — FIXED HEIGHT */
.quote-widget{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;padding:20px 22px;position:relative;cursor:pointer;overflow:hidden;min-height:120px;display:flex;flex-direction:column;justify-content:center}
.quote-text{font-size:15px;font-style:italic;color:#F0EFE9;line-height:1.7;font-weight:400}
.quote-author{font-size:12px;color:#8A8A9A;margin-top:10px;font-weight:600}

/* CARDS */
.card{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;overflow:hidden}
.card-head{padding:12px 18px;border-bottom:1px solid #2E2E3E;display:flex;justify-content:space-between;align-items:center;font-weight:600;font-size:13px;gap:8px;flex-wrap:wrap}
.card-head-left{display:flex;align-items:center;gap:8px;flex-shrink:0}
.card-head-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.refresh-btn,.sign-btn{background:rgba(79,142,247,0.12);color:#4F8EF7;border:1px solid rgba(79,142,247,0.25);padding:5px 12px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.sign-btn{background:#1A56CC;color:white;border:none;padding:6px 14px}
.clear-btn{background:rgba(248,113,113,0.12);color:#F87171;border:1px solid rgba(248,113,113,0.25);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif}
.add-event-btn{background:rgba(52,211,153,0.12);color:#34D399;border:1px solid rgba(52,211,153,0.25);padding:5px 10px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif}
.cal-date-input{background:#22222E;border:1px solid #2E2E3E;color:#F0EFE9;padding:5px 8px;border-radius:8px;font-size:11px;font-family:'Inter',sans-serif;cursor:pointer;outline:none}
.card-action-btn{min-width:80px;text-align:center}

/* DAY BAR */
.day-bar{display:flex;overflow-x:auto;gap:8px;padding:10px 15px;background:rgba(255,255,255,0.02);border-bottom:1px solid #2E2E3E}
.day-bar::-webkit-scrollbar{display:none}
.day-pill{padding:8px 14px;border-radius:10px;background:#22222E;font-size:11px;font-weight:700;white-space:nowrap;color:#8A8A9A;border:1px solid transparent;cursor:pointer;transition:all 0.15s}
.day-pill.active{background:#4F8EF7;color:white}

/* LIST ITEMS */
.list-item{padding:12px 18px;border-bottom:1px solid #2E2E3E;display:flex;justify-content:space-between;align-items:center;font-size:14px}
.list-item:last-child{border-bottom:none}

/* TASK ITEMS */
.task-item{padding:13px 18px;border-bottom:1px solid #2E2E3E;display:flex;align-items:center;gap:12px}
.task-item:last-child{border-bottom:none}
.task-item.done-item{opacity:0.55}
.task-cb{width:18px;height:18px;accent-color:#34D399;cursor:pointer;flex-shrink:0}
.task-title{font-size:16px;color:#F0EFE9;flex:1;font-weight:500}
.task-title.struck{text-decoration:line-through;color:#8A8A9A}

/* DELETE BUTTON */
.del-btn{background:#F87171;color:white;border:none;width:28px;height:28px;border-radius:8px;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-family:'Inter',sans-serif;line-height:1}

/* MAIL */
.mail-item{padding:12px 18px;border-bottom:1px solid #2E2E3E;cursor:pointer;display:block}
.mail-item:last-child{border-bottom:none}
.mail-top{display:flex;justify-content:space-between;margin-bottom:4px}
.mail-sender{font-size:13px;font-weight:700;color:#F0EFE9;display:flex;align-items:center;gap:6px}
.unread-dot{width:6px;height:6px;border-radius:50%;background:#4F8EF7;flex-shrink:0}
.mail-time{font-size:11px;color:#8A8A9A}
.mail-subject{font-size:12px;color:#F0EFE9;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mail-preview{font-size:11px;color:#8A8A9A;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
.empty{padding:28px;text-align:center;color:#8A8A9A;font-size:13px}

/* MODALS */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);display:none;flex-direction:column;padding:24px;z-index:200;overflow-y:auto}
.modal-overlay.active{display:flex}
.search-input{width:100%;background:#22222E;border:1px solid #2E2E3E;color:#F0EFE9;padding:14px;border-radius:12px;font-size:16px;outline:none;font-family:'Inter',sans-serif}
.guide-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.97);display:none;flex-direction:column;z-index:300;overflow-y:auto;padding:20px}
.guide-modal.active{display:flex}
.guide-sticky{position:sticky;top:0;background:rgba(15,15,19,0.95);padding:12px 0;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);margin-bottom:16px}
.guide-block{margin-bottom:14px;padding:16px;background:#22222E;border-radius:14px;border:1px solid #2E2E3E}
.guide-block h3{font-size:13px;color:#F0EFE9;margin-bottom:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.guide-block li{font-size:12px;color:#8A8A9A;line-height:1.8}
.guide-block ul{padding-left:16px}
.guide-tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700}
.tag-new{background:rgba(52,211,153,0.2);color:#34D399}
.tag-tip{background:rgba(251,191,36,0.2);color:#FBBF24}
.contact-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:400;padding:20px}
.contact-modal.active{display:flex}
.contact-card{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;padding:22px;width:100%;max-width:400px}
.contact-card h3{font-size:15px;font-weight:700;margin-bottom:4px}
.contact-card p{font-size:11px;color:#8A8A9A;margin-bottom:14px;line-height:1.6}
.contact-input{width:100%;background:#22222E;border:1px solid #2E2E3E;color:#F0EFE9;padding:11px 14px;border-radius:10px;font-size:14px;outline:none;font-family:'Inter',sans-serif;margin-bottom:10px}
.contact-textarea{width:100%;background:#22222E;border:1px solid #2E2E3E;color:#F0EFE9;padding:11px 14px;border-radius:10px;font-size:14px;outline:none;font-family:'Inter',sans-serif;resize:none;height:90px;margin-bottom:14px}

/* COUNTDOWN MODAL */
.cd-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:500;padding:24px}
.cd-modal.active{display:flex}
.cd-card{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;padding:24px;width:100%;max-width:360px}
.cd-card h3{font-size:16px;font-weight:700;margin-bottom:6px;text-align:center}
.cd-card p{font-size:12px;color:#8A8A9A;margin-bottom:18px;text-align:center}
.cd-field{width:100%;background:#22222E;border:1px solid #2E2E3E;color:#F0EFE9;padding:12px 14px;border-radius:10px;font-size:15px;outline:none;font-family:'Inter',sans-serif;margin-bottom:12px}
.cd-date-field{width:100%;background:#22222E;border:1px solid #2E2E3E;color:#F0EFE9;padding:12px 14px;border-radius:10px;font-size:15px;outline:none;font-family:'Inter',sans-serif;margin-bottom:16px;cursor:pointer}
.cd-btn-row{display:flex;gap:10px}
.cd-start-btn{flex:1;background:#1A56CC;color:white;border:none;padding:13px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px}
.cd-cancel-btn{flex:1;background:#22222E;color:#8A8A9A;border:1px solid #2E2E3E;padding:13px;border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px}

/* BOTTOM */
.bottom-bar{display:flex;gap:8px}
.bottom-btn{flex:1;background:#1A1A22;border:1px solid #2E2E3E;color:#8A8A9A;padding:12px;border-radius:14px;font-size:12px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;text-align:center}
.btn-nuke{background:#7f1d1d;color:#ffffff;border:none;padding:15px;border-radius:14px;font-weight:700;width:100%;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px}
.version-tag{text-align:center;font-size:13px;color:#8A8A9A;padding:10px 8px;opacity:0.6;cursor:pointer;font-weight:600;letter-spacing:0.3px;transition:opacity 0.2s}
.version-tag:hover{opacity:1}

/* GREETING BANNER */
.greeting-banner{background:linear-gradient(135deg,rgba(79,142,247,0.12) 0%,rgba(167,139,250,0.10) 100%);border:1px solid rgba(79,142,247,0.2);border-radius:20px;padding:16px 20px;text-align:center}
.greeting-line1{font-size:11px;color:#8A8A9A;text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:4px}
.greeting-line2{font-size:20px;font-weight:700;color:#F0EFE9;letter-spacing:0.2px}
.greeting-line2 span{color:#4F8EF7}

/* CHANGELOG MODAL */
.changelog-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a0e;display:none;flex-direction:column;z-index:350;overflow-y:auto;padding:20px}
.changelog-modal.active{display:flex}
.changelog-sticky{position:sticky;top:0;background:#0a0a0e;padding:12px 0;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(10px);margin-bottom:18px;border-bottom:1px solid #2E2E3E}
.cl-version-block{margin-bottom:12px;background:#1e1e28;border-radius:14px;border:1px solid #2E2E3E;overflow:visible}
.cl-version-head{padding:12px 14px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none;transition:background 0.15s;border-radius:14px;flex-wrap:nowrap;min-height:48px}
.cl-version-head.active-head{border-radius:14px 14px 0 0}
.cl-version-head:hover{background:rgba(255,255,255,0.04)}
.cl-version-badge{background:#1A56CC;color:white;font-size:10px;font-weight:800;padding:3px 9px;border-radius:20px;letter-spacing:0.3px;white-space:nowrap;flex-shrink:1;min-width:0}
.cl-version-date{font-size:11px;color:#8A8A9A;font-weight:500;white-space:nowrap;flex-shrink:0}
.cl-version-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700;white-space:nowrap;flex-shrink:0}
.cl-tag-current{background:rgba(52,211,153,0.2);color:#34D399}
.cl-tag-fix{background:rgba(248,113,113,0.15);color:#F87171}
.cl-version-body{display:none;background:#16161f;border-radius:0 0 14px 14px;border:1px solid #2E2E3E;border-top:none;overflow:visible}
.cl-version-body.open{display:block}
.cl-chevron{margin-left:auto;font-size:13px;color:#8A8A9A;transition:transform 0.2s;flex-shrink:0;padding-left:6px}
.changelog-modal .cl-item{font-size:13px;color:#C8C8D8;line-height:1.6;padding:8px 16px;border-bottom:1px solid rgba(255,255,255,0.05);display:flex;gap:10px;align-items:flex-start}
.changelog-modal .cl-item:last-child{border-bottom:none;padding-bottom:14px}
.changelog-modal .cl-item:first-child{padding-top:12px}

/* TOAST */
#bm-toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1A1A22;border:1px solid #2E2E3E;border-radius:999px;padding:10px 18px;color:#F0EFE9;font-size:12px;font-weight:600;z-index:9999;opacity:0;transition:opacity 0.2s ease}

/* REMINDER MODAL */
.reminder-modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:700;padding:24px}
.reminder-modal-overlay.active{display:flex}

/* ADD CALENDAR EVENT MODAL */
.add-cal-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.96);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:600;padding:20px}
.add-cal-modal.active{display:flex}
.add-cal-card{background:#1A1A22;border:1px solid #2E2E3E;border-radius:20px;padding:24px;width:100%;max-width:380px}
.add-cal-card h3{font-size:16px;font-weight:700;margin-bottom:4px;text-align:center}
.add-cal-card p{font-size:11px;color:#8A8A9A;margin-bottom:18px;text-align:center}
.add-cal-field{width:100%;background:#22222E;border:1px solid #2E2E3E;color:#F0EFE9;padding:12px 14px;border-radius:10px;font-size:15px;outline:none;font-family:'Inter',sans-serif;margin-bottom:10px}
.add-cal-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.add-cal-label{font-size:10px;color:#8A8A9A;text-transform:uppercase;font-weight:700;letter-spacing:1px;margin-bottom:5px}
.add-cal-btn-row{display:flex;gap:10px;margin-top:6px}
.add-cal-confirm{flex:1;background:#1A56CC;color:white;border:none;padding:13px;border-radius:10px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px}
.add-cal-cancel{flex:1;background:#22222E;color:#8A8A9A;border:1px solid #2E2E3E;padding:13px;border-radius:10px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;font-size:14px}
.local-event-badge{font-size:9px;background:rgba(52,211,153,0.2);color:#34D399;padding:2px 6px;border-radius:6px;font-weight:700;letter-spacing:0.5px;flex-shrink:0}
</style>
</head>
<body>
<div class="dashboard-grid">
  <!-- GREETING BANNER -->
  <div class="greeting-banner">
    <div class="greeting-line1">Welcome to</div>
    <div class="greeting-line2">Big <span>Minds</span> Dashboard</div>
  </div>

  <!-- ROW 1: Weather + Clock -->
  <div class="top-row">
    <div class="widget weather-widget" onclick="toggleSearch()">
      <div id="w-content"><div class="ctx-label">Tap to Search</div><div class="temp-big">--°</div></div>
      <div class="ctx-label" id="w-city">Choose Location</div>
    </div>
    <div class="widget">
      <div class="led-main" id="digi-hms">00:00:00</div>
      <div class="led-ms" id="digi-ms">00</div>
      <div class="ctx-label" id="c-meta">Timezone --</div>
    </div>
  </div>

  <!-- ROW 2: Stats -->
  <div class="row-split">
    <div class="stat-box" onclick="scrollToId('outlook-section')">
      <div class="stat-num" id="stat-mail">—</div>
      <div class="stat-lbl">Unread Mail</div>
    </div>
    <div class="stat-box" onclick="scrollToId('cal-section')">
      <div class="stat-num" id="stat-events">—</div>
      <div class="stat-lbl">Events Today</div>
    </div>
  </div>

  <!-- ROW 3: Countdown + Tasks -->
  <table style="width:100%;border-collapse:separate;border-spacing:10px 0;table-layout:fixed">
    <tr>
      <td style="width:50%;vertical-align:top;padding:0">
        <div class="countdown-widget" id="countdown-widget">
          <div class="cd-label">⏳ Countdown</div>
          <div id="cd-display-area" style="width:100%;display:flex;flex-direction:column;align-items:center;gap:5px">
            <div style="font-size:12px;color:#8A8A9A;margin-top:4px;text-align:center">No event set</div>
          </div>
          <button class="cd-add-btn" onclick="openCDModal()">＋ Add Event</button>
        </div>
      </td>
      <td style="width:50%;vertical-align:top;padding:0">
        <div class="tasks-widget" onclick="scrollToId('rem-section')">
          <div class="tasks-count" id="tasks-count">0</div>
          <div class="tasks-label">Uncompleted<br>Tasks Today</div>
        </div>
      </td>
    </tr>
  </table>

  <!-- QUOTE WIDGET — FIXED HEIGHT, NO REFRESH BUTTON -->
  <div class="quote-widget" id="quote-widget">
    <div class="quote-text" id="quote-text">Loading wisdom...</div>
    <div class="quote-author" id="quote-author"></div>
  </div>

  <!-- REMINDERS -->
  <div class="card" id="rem-section">
    <div class="card-head">
      <span>🔔 Reminders</span>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="clear-btn" onclick="clearDoneTasks()">Clear Done</button>
        <button onclick="openReminderModal()" style="background:none;border:none;color:#4F8EF7;font-size:26px;font-weight:bold;cursor:pointer;line-height:1;padding:0 4px">+</button>
      </div>
    </div>
    <div style="padding:10px 14px;border-bottom:1px solid #2E2E3E;display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.015)">
      <input type="date" id="rem-date-picker" onchange="onRemDatePick(this.value)" style="flex:1;min-width:0;background:#22222E;border:1px solid #2E2E3E;color:#F0EFE9;padding:7px 10px;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer;outline
