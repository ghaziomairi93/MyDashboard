<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Big Minds Dashboard v2.2.0 (F-Pattern Layout)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/seven-segment" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --bg: #0F0F13;
  --card: #1A1A22;
  --card2: #22222E;
  --border: #2E2E3E;
  --text: #F0EFE9;
  --muted: #8A8A9A;
  --blue: #4F8EF7;
  --blue2: #1A56CC;
  --green: #34D399;
  --amber: #FBBF24;
  --red: #F87171;
  --led-green: #39FF14;
  --nuke-bg: #7f1d1d;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { 
  font-family: 'Inter', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  padding: 20px; 
  max-width: 1400px; 
  margin: 0 auto; 
  padding-bottom: 120px;
}

/* F-PATTERN TOP BAR - STICKY STATS (Highest Priority) */
.f-top-bar {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  background: rgba(26,26,34,0.9);
  backdrop-filter: blur(20px);
  padding: 20px;
  border-radius: 24px;
  border: 1px solid var(--border);
  position: sticky;
  top: 20px;
  z-index: 100;
  margin-bottom: 20px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}

.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 24px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 100px;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.stat-box:hover { transform: scale(1.02); }
.stat-box:active { transform: scale(0.98); }
.stat-num { font-size: 48px; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
.stat-lbl { font-size: 12px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1.2px; }

/* F-PATTERN MAIN GRID */
.f-main-grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

.f-left-stem, .f-right-stem { display: flex; flex-direction: column; gap: 16px; }

/* WIDGETS */
.widget {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 24px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 160px;
  overflow: hidden;
}

.widget:hover { transform: scale(1.02); }
.led-main { font-family: 'Seven Segment', monospace; color: var(--led-green); font-size: 42px; font-weight: bold; text-shadow: 0 0 12px rgba(57,255,20,0.5); }
.led-ms { font-family: 'Seven Segment', monospace; color: var(--led-green); font-size: 16px; opacity: 0.8; margin-top: -4px; }
.ctx-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1.2px; margin-top: 10px; font-weight: 700; }
.temp-big { font-size: 52px; font-weight: 700; margin: 4px 0; }

/* COUNTDOWN & TASKS */
.countdown-widget, .tasks-widget { min-height: 180px; }
.cd-label, .tasks-label { font-size: 10px; color: var(--muted); text-transform: uppercase; font-weight: 700; letter-spacing: 1px; margin-bottom: 12px; text-align: center; }
.cd-event-name { font-size: 14px; font-weight: 700; color: var(--amber); line-height: 1.3; margin-bottom: 8px; }
.tasks-count { font-size: 60px; font-weight: 700; color: var(--amber); line-height: 1; }
.cd-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; width: 100%; margin-top: 8px; }
.cd-unit { background: var(--card2); border-radius: 12px; padding: 8px 4px; text-align: center; }
.cd-num { font-family: 'Seven Segment', monospace; font-size: 18px; color: var(--led-green); text-shadow: 0 0 8px rgba(57,255,20,0.4); }
.cd-unit-lbl { font-size: 8px; color: var(--muted); text-transform: uppercase; font-weight: 700; margin-top: 2px; }

/* QUOTE WIDGET */
.quote-widget {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 24px;
  cursor: pointer;
  min-height: 120px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  transition: all 0.2s;
}
.quote-widget:hover { transform: scale(1.02); }
.quote-text { font-size: 15px; font-style: italic; color: var(--text); line-height: 1.7; }
.quote-author { font-size: 12px; color: var(--muted); margin-top: 12px; font-weight: 600; }

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 24px;
  overflow: hidden;
  min-height: 320px;
}
.card-head {
  padding: 20px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-weight: 700;
  font-size: 14px;
}
.card-head-left { display: flex; align-items: center; gap: 12px; }
.card-action-btn { 
  min-width: 90px; 
  padding: 10px 16px; 
  border-radius: 12px; 
  font-weight: 700; 
  font-size: 12px; 
  cursor: pointer;
  font-family: 'Inter', sans-serif;
}
.refresh-btn { background: rgba(79,142,247,0.15); color: var(--blue); border: 1px solid rgba(79,142,247,0.3); }
.sign-btn { background: var(--blue2); color: white; border: none; }
.clear-btn { background: rgba(248,113,113,0.15); color: var(--red); border: 1px solid rgba(248,113,113,0.3); }
.add-event-btn { background: rgba(52,211,153,0.15); color: var(--green); border: 1px solid rgba(52,211,153,0.3); }

/* DAY BAR */
.day-bar { 
  display: flex; 
  overflow-x: auto; 
  gap: 10px; 
  padding: 16px; 
  background: rgba(255,255,255,0.02); 
  border-bottom: 1px solid var(--border);
}
.day-pill { 
  padding: 10px 16px; 
  border-radius: 12px; 
  background: var(--card2); 
  font-size: 12px; 
  font-weight: 700; 
  white-space: nowrap; 
  color: var(--muted); 
  border: 1px solid transparent; 
  cursor: pointer; 
  transition: all 0.2s; 
}
.day-pill.active { background: var(--blue); color: white; }

/* LIST ITEMS */
.list-item, .task-item, .mail-item {
  padding: 16px 24px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 16px;
}
.list-item:last-child, .task-item:last-child, .mail-item:last-child { border-bottom: none; }
.task-cb { width: 20px; height: 20px; accent-color: var(--green); cursor: pointer; }
.task-title { font-size: 16px; color: var(--text); flex: 1; font-weight: 500; }
.task-title.struck { text-decoration: line-through; color: var(--muted); }
.del-btn { 
  background: var(--red); 
  color: white; 
  border: none; 
  width: 32px; 
  height: 32px; 
  border-radius: 10px; 
  cursor: pointer; 
  font-size: 14px; 
  display: flex; 
  align-items: center; 
  justify-content: center; 
}

/* BOTTOM ACTIONS */
.bottom-bar { display: flex; gap: 16px; margin-top: 24px; }
.bottom-btn { 
  flex: 1; 
  background: var(--card); 
  border: 1px solid var(--border); 
  color: var(--muted); 
  padding: 16px; 
  border-radius: 16px; 
  font-size: 13px; 
  font-weight: 600; 
  cursor: pointer; 
}
.btn-nuke { 
  background: var(--nuke-bg); 
  color: white; 
  border: none; 
  padding: 20px; 
  border-radius: 16px; 
  font-weight: 700; 
  width: 100%; 
  margin-top: 16px; 
  cursor: pointer; 
  font-size: 14px; 
}
.version-tag { 
  text-align: center; 
  font-size: 13px; 
  color: var(--muted); 
  padding: 16px; 
  opacity: 0.6; 
  cursor: pointer; 
  font-weight: 600; 
  transition: opacity 0.2s; 
}
.version-tag:hover { opacity: 1; }

/* GREETING */
.greeting-banner {
  background: linear-gradient(135deg, rgba(79,142,247,0.15) 0%, rgba(167,139,250,0.12) 100%);
  border: 1px solid rgba(79,142,247,0.25);
  border-radius: 24px;
  padding: 20px 24px;
  text-align: center;
  margin-bottom: 20px;
}
.greeting-line1 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; font-weight: 700; margin-bottom: 6px; }
.greeting-line2 { font-size: 24px; font-weight: 700; letter-spacing: 0.3px; }
.greeting-line2 span { color: var(--blue); }

/* MODALS */
.modal-overlay, .guide-modal, .changelog-modal {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.95);
  display: none;
  flex-direction: column;
  padding: 24px;
  z-index: 1000;
  overflow-y: auto;
}
.modal-overlay.active, .guide-modal.active, .changelog-modal.active { display: flex; }
.search-input, .cd-field, .contact-input {
  width: 100%;
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 16px;
  border-radius: 12px;
  font-size: 16px;
  outline: none;
  font-family: 'Inter', sans-serif;
  margin-bottom: 16px;
}

/* TOAST */
#bm-toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 999px;
  padding: 12px 24px;
  color: var(--text);
  font-size: 13px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .f-main-grid { grid-template-columns: 1fr; }
  .f-top-bar { grid-template-columns: 1fr; gap: 12px; }
  body { padding: 16px; }
  .stat-num { font-size: 36px !important; }
}
</style>
</head>
<body>

<!-- F-PATTERN GREETING -->
<div class="greeting-banner">
  <div class="greeting-line1">Welcome to</div>
  <div class="greeting-line2">Big <span>Minds</span> Dashboard</div>
</div>

<!-- F-PATTERN TOP BAR: STATS (Mail/Events) -->
<div class="f-top-bar">
  <div class="stat-box" onclick="scrollToId('outlook-section')">
    <div class="stat-num" id="stat-mail">—</div>
    <div class="stat-lbl">Unread Mail</div>
  </div>
  <div class="stat-box" onclick="scrollToId('cal-section')">
    <div class="stat-num" id="stat-events">—</div>
    <div class="stat-lbl">Events Today</div>
  </div>
</div>

<!-- F-PATTERN MAIN GRID -->
<div class="f-main-grid">
  
  <!-- LEFT STEM: Primary Scan Path -->
  <div class="f-left-stem">
    
    <!-- WEATHER (Top Left - Priority 1) -->
    <div class="widget weather-widget" onclick="toggleSearch()">
      <div id="w-content">
        <div class="ctx-label">Current Weather</div>
        <div class="temp-big">--°</div>
      </div>
      <div class="ctx-label" id="w-city">Choose Location</div>
    </div>
    
    <!-- COUNTDOWN (Priority 2) -->
    <div class="countdown-widget" id="countdown-widget">
      <div class="cd-label">⏳ Countdown</div>
      <div id="cd-event-name" style="font-size:12px;color:var(--amber);font-weight:700;text-align:center;margin-bottom:8px;">No event set</div>
      <div id="cd-display-area" style="display:flex;gap:8px;margin-top:8px;width:100%">
        <div class="cd-unit"><div class="cd-num">0</div><div class="cd-unit-lbl">Years</div></div>
        <div class="cd-unit"><div class="cd-num">0</div><div class="cd-unit-lbl">Days</div></div>
      </div>
      <button class="cd-add-btn" onclick="openCDModal()" style="margin-top:12px;width:100%;padding:12px;border-radius:12px;background:rgba(79,142,247,0.15);color:var(--blue);border:1px solid rgba(79,142,247,0.3);font-weight:700;cursor:pointer">+ Add Event</button>
    </div>
    
    <!-- REMINDERS (Priority 3) -->
    <div class="card" id="rem-section">
      <div class="card-head">
        <span>🔔 Reminders</span>
        <div style="display:flex;gap:12px">
          <button class="clear-btn card-action-btn" onclick="clearDoneTasks()">Clear Done</button>
          <button class="add-event-btn card-action-btn" onclick="openReminderModal()">+ Add</button>
        </div>
      </div>
      <div style="padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.02)">
        <input type="date" id="rem-date-picker" onchange="onRemDatePick(this.value)" style="flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:10px;font-size:13px">
      </div>
      <div class="day-bar" id="rem-day-bar"></div>
      <div id="rem-list" style="max-height:220px;overflow-y:auto"></div>
    </div>
    
  </div>
  
  <!-- RIGHT STEM: Secondary Scan Path -->
  <div class="f-right-stem">
    
    <!-- CLOCK (Top Right) -->
    <div class="widget">
      <div class="led-main" id="digi-hms">00:00:00</div>
      <div class="led-ms" id="digi-ms">00</div>
      <div class="ctx-label" id="c-meta">Loading timezone...</div>
    </div>
    
    <!-- TASKS COUNT -->
    <div class="tasks-widget" onclick="scrollToId('rem-section')">
      <div class="tasks-count" id="tasks-count">0</div>
      <div class="tasks-label">Uncompleted<br>Tasks Today</div>
    </div>
    
    <!-- QUOTE (Sequential, Tap to Next) -->
    <div class="quote-widget" id="quote-widget">
      <div class="quote-text" id="quote-text">Loading wisdom...</div>
      <div class="quote-author" id="quote-author"></div>
    </div>
    
  </div>
  
</div>

<!-- F-PATTERN CONTENT CARDS -->
<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:20px">
  
  <!-- GOOGLE CALENDAR -->
  <div class="card" id="cal-section">
    <div class="card-head">
      <div class="card-head-left">
        <svg width="22" height="22" viewBox="0 0 48 48">
          <rect width="48" height="48" rx="8" fill="#4285F4"/>
          <rect x="6" y="8" width="36" height="10" fill="white"/>
          <rect x="6" y="34" width="12" height="8" rx="2" fill="#FBBC04"/>
          <rect x="30"
